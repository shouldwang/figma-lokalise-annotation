<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lokalization List</title>
  <style>
    body {
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, 'Liberation Sans', 'Nimbus Sans', 'sans-serif';
      margin: 0;
      background: #fff;
      min-height: 100vh;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }
    body::-webkit-scrollbar {
      display: none;
    }
    .sticky-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .info-bar {
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }
    .chip-group {
      display: flex;
      gap: 8px;
      padding: 12px;
      flex-wrap: nowrap;             
      overflow-x: auto;              
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      cursor: grab;
    }
    .chip-group::-webkit-scrollbar {
      display:none;
    }
    .chip-group.active {
      cursor: grabbing;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      height: 30px;
      padding: 0px 12px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 400;
      border: 1px solid #e6e6e6;
      background: #fff;
      color: #333;
      cursor: pointer;
      transition: border 0.15s, color 0.15s;
      -webkit-user-select: none;
      user-select: none;
      white-space: nowrap;        
    }
    .chip.selected {
      color: #fff;
      background: #333;
      z-index: 1;
    }
    .dup-warning-list {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      font-size: 14px;
      font-weight: 600;
      color: #e00;
      background: #ee000011;
    }
    .card-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1 1 auto;
      min-height: 0;
      padding: 12px 12px 80px 12px;
      background: #fafafa;
    }
    .card {
      background: #fff;
      border: 1px solid #E6E6E6;
      border-radius: 4px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: border-color 0.15s, box-shadow 0.15s;
      position: relative;
    }
    .card:hover {
      border-color: #CCCCCC;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .card.disabled {
      pointer-events: none;
      opacity: 0.3;
    }
    .card-duplicate {
      box-shadow: 0 0 0 2px #ff333355;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .label-group {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .project-label {
      background: #1d4ed812;
      border: 1px solid #1d4ed833;
      border-radius: 999px;
      font-family: 'DM Mono', 'Menlo', 'Consolas', monospace;
      font-size: 12px;
      font-weight: 600;
      color: #1e3a8a;
      padding: 4px 10px;
      display: inline-flex;
      align-items: center;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }
    .exist-label {
      background: #14532d12;
      border: 1px solid #16a34a33;
      border-radius: 999px;
      font-family: 'DM Mono', 'Menlo', 'Consolas', monospace;
      font-size: 11px;
      font-weight: 600;
      color: #166534;
      padding: 4px 8px;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }
    .count-label {
      background: #33415512;
      border: 1px solid #33415533;
      border-radius: 999px;
      font-family: 'DM Mono', 'Menlo', 'Consolas', monospace;
      font-size: 11px;
      font-weight: 600;
      color: #334155;
      padding: 4px 8px;
      line-height: 1;
      letter-spacing: 0.02em;
    }
    .card-actions {
      display: flex;
      gap: 8px;
    }
    .card-action-btn {
      border: 1px solid #E6E6E6;
      background: #fff;
      border-radius: 2px;
      height: 28px;
      width: 28px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      outline: none;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-action-btn:hover {
      background: #FAFAFA;
    }
    a.card-action-btn {
      text-decoration: none;
      color: inherit;
    }
    .card-action-btn[disabled] {
      color: #b3b3b3;
      border-color: #eee;
      cursor: not-allowed;
      background: #fafafa;
    }
    .card-action-btn .tooltip {
      display: none;
      position: absolute;
      bottom: 120%;
      left: 50%;
      transform: translateX(-50%);
      background: #222;
      color: #fff;
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 4px;
      white-space: nowrap;
      z-index: 10;
      pointer-events: none;
    }
    .card-action-btn:hover .tooltip {
      display: block;
    }
    .card-key {
      font-size: 15px;
      font-family: 'DM Mono', 'Menlo', 'Consolas', monospace;
      font-weight: 600;
      color: #333333;
      line-height: 1.5;
      word-break: break-all;
    }
    .card-draft {
      font-size: 15px;
      font-weight: 400;
      color: #333;
      line-height: 1.5;
      word-break: break-word;
    }
    .card-edit-row {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .card-edit-header {
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
    }
    .edit-row-top {
      display: flex;
      flex-direction: row;
      gap: 8px;
      align-items: stretch;
    }
    .select-inline {
      width: 100%;
      min-width: 80px;
      font-size: 14px;
      flex: 1 1 auto;
      height: 32px;
      border: 1px solid #e6e6e6;
      border-radius: 4px;
      padding-right: 24px;
    }
    .save-btn {
      flex: 0 0 auto;
      height: 100%;
      padding: 4px 16px;
      font-size: 14px;
      border-radius: 2px;
      border: 1px solid #1d4ed8;
      background: #1d4ed8;
      color: #fff;
      font-weight: 600;
      transition: background 0.15s, border-color 0.15s;
    }
    .save-btn:disabled {
      background: #e5e7eb;
      color: #b3b3b3;
      border: 1px solid #e5e7eb;
      cursor: not-allowed;
    }
    .input-inline {
      width: 100%;
      font-size: 14px;
      height: 32px;
      box-sizing: border-box;
      border-radius:4px;
      border: 1px solid #e6e6e6;
      padding: 0 8px;
    }
    .error-msg {
      color: #ff3333;
      font-size: 14px;
    }
    .disabled-text {
      color: #b3b3b3 !important;
    }
    /* Floating Action Button Styles */
    .fab-container {
      width: calc(100% - 16px);
      position: fixed;
      bottom: 0px;
      display: flex;
      flex-direction: row;
      align-items: stretch;
      justify-content: space-between;
      gap: 16px;
      z-index: 1000;
      padding: 16px 8px;
      background: linear-gradient(0deg, #ffffff, transparent);
      backdrop-filter: blur(0.5px);
    }
    
    .fab-search-container {
      width: 100%;
      display: flex;
      align-items: center;
      background: #fff;
      border: 1px solid #e6e6e6;
      border-radius: 999px;
      padding: 8px 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      transition: box-shadow 0.15s, border-color 0.15s;
    }
    
    .fab-search-container:focus-within {
      border: 2px solid #1d4ed8;
      box-shadow: 0 4px 20px rgba(29, 78, 216, 0.15);
    }
    
    .fab-search-input {
      border: none;
      outline: none;
      font-size: 14px;
      width: 100%;
      padding: 4px 0;
      background: transparent;
    }
    
    .fab-search-input::placeholder {
      color: #999;
    }
    
    .fab-export-btn {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      aspect-ratio: 1;
      flex-shrink: 0;
      font-size: 20px;
      background: #396af2;
      color: #fff;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(29, 78, 216, 0.3);
      transition: all 0.15s;
    }
     .fab-export-btn .tooltip {
      display: none;
      position: absolute;
      bottom: 52px;
      right: 0px;
      background: #222;
      color: #fff;
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 4px;
      white-space: nowrap;
      z-index: 10;
      pointer-events: none;
    }
    .fab-export-btn:hover .tooltip {
      display: block;
    }
    
    .fab-export-btn:hover:not(:disabled) {
      background: #1e40af;
      box-shadow: 0 8px 24px rgba(29, 78, 216, 0.4);
    }
    
    .fab-export-btn:disabled {
      background: #e5e7eb;
      color: #9ca3af;
      cursor: not-allowed;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transform: none;
    }
    
    .file-url-bar {
      padding: 8px 16px;
      background: #fffbeb;
      border-bottom: 1px solid #fde68a;
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 12px;
    }
    .file-url-bar.configured {
      background: #f0fdf4;
      border-bottom-color: #bbf7d0;
      flex-direction: row;
      align-items: center;
    }
    .file-url-bar-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .file-url-input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 12px;
      outline: none;
    }
    .file-url-input:focus {
      border-color: #396af2;
    }
    .file-url-save-btn {
      background: #396af2;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    .file-url-save-btn:hover { background: #1e40af; }
    .file-url-status {
      color: #16a34a;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    .file-url-error {
      color: #dc2626;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="sticky-bar">
    <div id="fileUrlBar" class="file-url-bar" style="display:none"></div>
    <div class="info-bar">
      <div class="chip-group" id="projectChipGroup"></div>
      <div id="dupWarningsContainer"></div>
    </div>
  </div>
  <div class="card-list" id="cardList"></div>
  
  <!-- Floating Action Buttons -->
  <div class="fab-container">
    <div class="fab-search-container">
      <input id="searchKey" class="fab-search-input" type="text" placeholder="Search Key">
    </div>
    <button id="exportBtn" class="fab-export-btn" disabled>💾<span class="tooltip">Export CSV</span></button>
  </div>
  
  <script>
let currentData = [];
let editingIndex = null;
let filterProject = "All";
let searchKey = "";
let showDupKeys = [];
let locateCycleCursor = {};
let projectList = [];
let fileName = "";
let storedFileKey = "";
let languageSettings = {
  baseLanguage: { code: 'en', name: 'English' },
  supportedLanguages: [
    { code: 'ja', name: 'Japanese' },
    { code: 'zh_TW', name: 'Chinese Traditional' },
    { code: 'en_US', name: 'English (United States)' },
    { code: 'zh_CN', name: 'Chinese Simplified' }
  ]
};

function getProjectList() {
  return projectList;
}

function renderFileUrlBar(justSaved = false) {
  const bar = document.getElementById("fileUrlBar");
  if (storedFileKey) {
    bar.className = "file-url-bar configured";
    bar.style.display = "flex";
    bar.innerHTML = justSaved
      ? `<span style="color:#16a34a;font-weight:500">✓ Saved! Frame URL configured.</span>
         <span class="file-url-status" id="updateUrlBtn" style="margin-left:auto;color:#6b7280;text-decoration:underline">Update</span>`
      : `<span style="color:#16a34a">🔗 Frame URL configured</span>
         <span class="file-url-status" id="updateUrlBtn" style="margin-left:auto;color:#6b7280;text-decoration:underline">Update</span>`;
    bar.querySelector("#updateUrlBtn").onclick = () => {
      storedFileKey = "";
      renderFileUrlBar();
    };
  } else {
    bar.className = "file-url-bar";
    bar.style.display = "flex";
    bar.innerHTML = `
      <span style="color:#92400e">🔗 Bind Figma URL to include frame links in exported CSV</span>
      <div class="file-url-bar-row">
        <input class="file-url-input" id="figmaUrlInput" type="text" placeholder="https://www.figma.com/design/..." autocomplete="off">
        <button class="file-url-save-btn" id="saveUrlBtn">Save</button>
      </div>
      <span class="file-url-error" id="urlError" style="display:none">Invalid URL — make sure it's a figma.com/design/... URL</span>
    `;
    bar.querySelector("#saveUrlBtn").onclick = () => {
      const url = bar.querySelector("#figmaUrlInput").value.trim();
      parent.postMessage({ pluginMessage: { type: "save-figma-url", url } }, "*");
    };
  }
}

// --- chip group 拖拽功能 ---
function initChipGroupDrag() {
  const chipGroup = document.getElementById('projectChipGroup');
  let isDown = false;
  let startX;
  let scrollLeft;

  chipGroup.addEventListener('mousedown', (e) => {
    isDown = true;
    chipGroup.classList.add('active');
    startX = e.pageX - chipGroup.offsetLeft;
    scrollLeft = chipGroup.scrollLeft;
    chipGroup.style.cursor = 'grabbing';
    chipGroup.style.userSelect = 'none';
  });

  chipGroup.addEventListener('mouseleave', () => {
    isDown = false;
    chipGroup.classList.remove('active');
    chipGroup.style.cursor = 'grab';
    chipGroup.style.userSelect = 'auto';
  });

  chipGroup.addEventListener('mouseup', () => {
    isDown = false;
    chipGroup.classList.remove('active');
    chipGroup.style.cursor = 'grab';
    chipGroup.style.userSelect = 'auto';
  });

  chipGroup.addEventListener('mousemove', (e) => {
    if (!isDown) return;
    e.preventDefault();
    const x = e.pageX - chipGroup.offsetLeft;
    const walk = (x - startX) * 2; // 調整拖拽速度
    chipGroup.scrollLeft = scrollLeft - walk;
  });

  // 設置初始樣式
  chipGroup.style.cursor = 'grab';
}

// --- 新增 chip group 渲染 ---
function renderProjectChipGroup() {
  const chipGroup = document.getElementById('projectChipGroup');
  chipGroup.innerHTML = '';
  // 計算各 project 筆數
  const projects = getProjectList();
  const countMap = {};
  projects.forEach(proj => countMap[proj] = 0);
  mergeIdenticalEntries(currentData).forEach(row => {
    if (countMap.hasOwnProperty(row.projectName)) countMap[row.projectName]++;
  });
  // All 筆數
  const allCount = mergeIdenticalEntries(currentData).length;
  // 產生 All chip
  const allChip = document.createElement('div');
  allChip.className = 'chip' + (filterProject === "All" ? ' selected' : '');
  allChip.textContent = `All (${allCount})`;
  allChip.onclick = () => {
    filterProject = "All";
    editingIndex = null;
    showDupKeys = [];
    renderProjectChipGroup();
    renderCardList(getFilteredData(), null);
    updateExportDropdownState();
  };
  chipGroup.appendChild(allChip);
  // 產生有資料的 project chip（依 projectList 順序）
  projects.forEach(proj => {
    if (countMap[proj] > 0) {
      const chip = document.createElement('div');
      chip.className = 'chip' + (filterProject === proj ? ' selected' : '');
      chip.textContent = `${proj} (${countMap[proj]})`;
      chip.onclick = () => {
        filterProject = proj;
        editingIndex = null;
        showDupKeys = [];
        renderProjectChipGroup();
        renderCardList(getFilteredData(), null);
        updateExportDropdownState();
      };
      chipGroup.appendChild(chip);
    }
  });
}

function findDuplicateKeyNamesDetail(data) {
  const groups = {};
  data.forEach(row => {
    const key = (row.projectName || "") + "||" + (row.keyName || "");
    if (!groups[key]) groups[key] = [];
    groups[key].push(row);
  });
  
  return Object.entries(groups)
    .filter(([k, rows]) => rows.length > 1)
    .map(([k, rows]) => {
      const [project, keyName] = k.split("||");
      const uniqueContents = [...new Set(rows.map(r => r.content || ""))];
      return [project, keyName, rows.length, uniqueContents.length > 1];
    })
    .filter(([project, keyName, count, hasConflict]) => hasConflict); // Only return conflicts
}

function mergeIdenticalEntries(data) {
  const groups = {};
  const merged = [];
  
  data.forEach(row => {
    const key = (row.projectName || "") + "||" + (row.keyName || "") + "||" + (row.content || "");
    if (!groups[key]) {
      groups[key] = row;
      merged.push(row);
    }
    // Identical entries are automatically skipped
  });
  
  return merged;
}

function countSameKeyEntries(data) {
  const countMap = {};
  data.forEach((row) => {
    const key = (row.projectName || "") + "||" + (row.keyName || "");
    countMap[key] = (countMap[key] || 0) + 1;
  });
  return countMap;
}

function getLocateGroupKey(row) {
  return (row.projectName || "") + "||" + (row.keyName || "");
}

function getNextLocateUuid(row) {
  const groupKey = getLocateGroupKey(row);
  const uuids = currentData
    .filter((item) => getLocateGroupKey(item) === groupKey && item.uuid)
    .map((item) => item.uuid);
  if (uuids.length === 0) return row.uuid;

  let cursor = locateCycleCursor[groupKey];
  if (typeof cursor !== "number" || cursor < 0 || cursor >= uuids.length) {
    const initialIndex = uuids.indexOf(row.uuid);
    cursor = initialIndex >= 0 ? initialIndex : 0;
  } else {
    cursor = (cursor + 1) % uuids.length;
  }
  locateCycleCursor[groupKey] = cursor;
  return uuids[cursor];
}

function getFilteredData() {
  let filtered = mergeIdenticalEntries(currentData).filter(row => {
    const projectMatch = (filterProject === "All" || row.projectName === filterProject);
    const searchMatch = (!searchKey || (row.keyName && row.keyName.toLowerCase().includes(searchKey.toLowerCase())));
    return projectMatch && searchMatch;
  });
  if (showDupKeys.length > 0) {
    const dupSet = new Set(showDupKeys);
    filtered = filtered.filter(row => dupSet.has((row.projectName || "") + "||" + (row.keyName || "")));
  }
  return filtered;
}

function renderCardList(data, editingIdx = null) {
  updateExportBtnAndDupWarning(mergeIdenticalEntries(currentData));
  const cardList = document.getElementById("cardList");
  cardList.innerHTML = "";
  if (Array.isArray(data) && data.length > 0) {
    const dupSet = new Set(findDuplicateKeyNamesDetail(mergeIdenticalEntries(currentData)).map(([project, keyName]) => project + "||" + keyName));
    const sameKeyCountMap = countSameKeyEntries(currentData);
    data.forEach((row, idx) => {
      const groupKey = (row.projectName || "") + "||" + (row.keyName || "");
      const sameKeyCount = sameKeyCountMap[groupKey] || 1;
      const card = document.createElement("div");
      card.className = "card" +
        (dupSet.has(row.projectName + "||" + row.keyName) ? " card-duplicate" : "") +
        (editingIdx === idx ? "" : "");
      if (editingIdx !== null && editingIdx !== idx) {
        card.classList.add("disabled");
      }
      card.dataset.index = idx;

      // 預設模式
      if (editingIdx !== idx) {
        card.innerHTML = `
          <div class="card-header">
            <div class="label-group">
              <span class="project-label">${row.projectName || ""}</span>
              <span class="count-label">${sameKeyCount} items</span>
              ${row.exist ? '<span class="exist-label">EXIST</span>' : ''}
            </div>
            <div class="card-actions">
              <button class="card-action-btn locate-btn" title="Locate">
                📍<span class="tooltip">Locate</span>
              </button>
              <button class="card-action-btn edit-btn" title="Edit">
                ✏️<span class="tooltip">Edit</span>
              </button>
              <button class="card-action-btn delete-btn" title="Delete">
                🗑️<span class="tooltip">Delete</span>
              </button>
            </div>
          </div>
          <div class="card-key">${row.keyName || ""}</div>
          <div class="card-draft">${row.content || ""}</div>
        `;
        // 綁定 action btns
        card.querySelector('.locate-btn').onclick = (e) => {
          e.stopPropagation();
          const locateUuid = getNextLocateUuid(row);
          parent.postMessage({
            pluginMessage: { type: "locate-row", uuid: locateUuid }
          }, "*");
        };
        card.querySelector('.edit-btn').onclick = (e) => {
          e.stopPropagation();
          editingIndex = idx;
          renderCardList(getFilteredData(), editingIndex);
        };
        card.querySelector('.delete-btn').onclick = (e) => {
          e.stopPropagation();
          if (confirm('Are you sure you want to delete this row?')) {
            parent.postMessage({
              pluginMessage: { type: "delete-row", uuid: row.uuid }
            }, "*");
          }
        };
      } else {
        // 編輯模式
        const projects = getProjectList();
        card.innerHTML = `
          <div class="card-edit-row">
            <div class="card-edit-header">
              <div class="edit-row-top">
                <select class="select-inline" id="edit-project">
                  ${projects.map(p => `<option value="${p}"${row.projectName === p ? " selected" : ""}>${p}</option>`).join("")}
                </select>
                <button class="save-btn" id="save-btn">Save</button>
              </div>
              <input class="input-inline" id="edit-key" value="${row.keyName || ""}" autocomplete="off">
              <div class="error-msg" id="edit-key-err" style="display:none"></div>
            </div>
            <div class="card-draft">${row.content || ""}</div>
          </div>
        `;
        // 綁定儲存
        const saveBtn = card.querySelector('#save-btn');
        const keyInput = card.querySelector('#edit-key');
        const projectSelect = card.querySelector('#edit-project');
        const keyErr = card.querySelector('#edit-key-err');
        function validateEdit() {
          let valid = true;
          let keyVal = keyInput.value.replace(/[^A-Za-z0-9\-\_\.]/g, '');
          keyInput.value = keyVal;
          if (!keyVal) {
            keyErr.textContent = "Key cannot be empty";
            keyErr.style.display = "block";
            valid = false;
          } else if (!/^[A-Za-z0-9\-\_\.]+$/.test(keyVal)) {
            keyErr.textContent = "Only uppercase and lowercase letters, numbers, -, _, . are allowed.";
            keyErr.style.display = "block";
            valid = false;
          } else {
            keyErr.style.display = "none";
          }
          saveBtn.disabled = !valid;
          return valid;
        }
        keyInput.addEventListener('input', validateEdit);
        saveBtn.onclick = function() {
          if (!validateEdit()) return;
          const newProject = projectSelect.value;
          const newKey = keyInput.value;
          parent.postMessage({
            pluginMessage: {
              type: "update-row",
              uuid: row.uuid,
              oldProjectName: row.projectName || "",
              oldKeyName: row.keyName || "",
              projectName: newProject,
              keyName: newKey,
              applyToSameKey: true
            }
          }, "*");
        };
        validateEdit();
      }
      cardList.appendChild(card);
    });
  } else {
    const emptyDiv = document.createElement("div");
    emptyDiv.style.color = "#888";
    emptyDiv.style.textAlign = "center";
    emptyDiv.style.margin = "32px 0";
    emptyDiv.textContent = "No data found.";
    cardList.appendChild(emptyDiv);
  }
}

function updateExportBtnAndDupWarning(data) {
  const exportBtn = document.getElementById("exportBtn");
  const dupWarningsContainer = document.getElementById("dupWarningsContainer");

  // 詳列所有重複 key（以 project+keyName 為單位，但只顯示 content 衝突的）
  const dupList = findDuplicateKeyNamesDetail(data);
  dupWarningsContainer.innerHTML = "";
  if (dupList.length > 0) {
    exportBtn.disabled = true;
    dupList.forEach(([project, key, count, hasConflict]) => {
      const keyId = project + "||" + key;
      const warnDiv = document.createElement("div");
      warnDiv.className = "dup-warning-list";
      warnDiv.innerHTML = `<span>You have conflicting content for ${key} in ${project}.</span><button class="action-btn dupCheck-btn" data-key="${keyId}" style="font-size:14px; padding:4px 8px; border-radius:4px; border:none; background:#ffffff; color:#333; cursor:pointer; white-space:nowrap; min-width:fit-content;">${showDupKeys.length === 1 && showDupKeys[0] === keyId ? "show all" : "check"}</button>`;
      dupWarningsContainer.appendChild(warnDiv);
    });
    dupWarningsContainer.querySelectorAll('.dupCheck-btn').forEach(btn => {
      btn.onclick = function() {
        const keyId = this.getAttribute('data-key');
        if (showDupKeys.length === 1 && showDupKeys[0] === keyId) {
          showDupKeys = [];
        } else {
          showDupKeys = [keyId];
        }
        renderCardList(getFilteredData(), null);
      };
    });
  } else {
    exportBtn.disabled = !(Array.isArray(currentData) && currentData.length > 0);
  }
}


// 匯出 CSV
function escapeCSV(value) {
  if (value == null) return '';
  const str = String(value);
  if (str.includes(',') || str.includes('"') || str.includes('\n') || str.includes('\r')) {
    return '"' + str.replace(/"/g, '""') + '"';
  }
  return str;
}

function generateCSVHeader() {
  const headers = ["Project", "Key", "Link", languageSettings.baseLanguage.code];
  languageSettings.supportedLanguages.forEach(lang => {
    headers.push(lang.code);
  });
  return headers.map(escapeCSV).join(",");
}

function generateCSVRow(row) {
  const rowData = [row.projectName, row.keyName, row.frameUrl || "", row.content];
  languageSettings.supportedLanguages.forEach(() => {
    rowData.push("");
  });
  return rowData.map(escapeCSV).join(",");
}

function exportFullCSV() {
  const today = (new Date()).toISOString().slice(0, 10).replace(/-/g, '');
  const safeName = (fileName || 'export').replace(/[/\\?%*:|"<>]/g, '-');
  const mergedData = mergeIdenticalEntries(currentData);
  const header = generateCSVHeader();
  const rows = [header, ...mergedData.map(row => generateCSVRow(row))];
  const csv = rows.join("\n");
  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `${safeName}-${today}.csv`;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => {
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, 0);
}

// 搜尋 key
document.getElementById('searchKey').addEventListener('input', function(e) {
  searchKey = this.value;
  editingIndex = null;
  showDupKeys = [];
  renderCardList(getFilteredData(), null);
});

const exportBtn = document.getElementById("exportBtn");

exportBtn.onclick = function() {
  if (exportBtn.disabled) return;
  exportFullCSV();
};

// 處理 Figma 傳來的資料
window.onmessage = (event) => {
  const { pluginMessage } = event.data;
  if (pluginMessage && pluginMessage.type === "lokalise-data") {
    currentData = pluginMessage.data;
    if (pluginMessage.fileName) fileName = pluginMessage.fileName;
    const wasEmpty = !storedFileKey;
    if (pluginMessage.storedFileKey !== undefined) storedFileKey = pluginMessage.storedFileKey;
    const justSaved = wasEmpty && !!storedFileKey;
    editingIndex = null;
    showDupKeys = [];
    locateCycleCursor = {};
    updateAllUI(justSaved);
  }
  if (pluginMessage && pluginMessage.type === "save-figma-url-error") {
    const errEl = document.getElementById("urlError");
    if (errEl) { errEl.style.display = "inline"; }
  }
  if (pluginMessage && pluginMessage.type === "lokalise-data-updated") {
    currentData = pluginMessage.data;
    editingIndex = null;
    showDupKeys = [];
    locateCycleCursor = {};
    updateAllUI();
  }
  if (pluginMessage && pluginMessage.type === "project-list") {
    projectList = Array.isArray(pluginMessage.projects) ? pluginMessage.projects : [];
    updateAllUI();
  }
  if (pluginMessage && pluginMessage.type === "language-settings") {
    if (pluginMessage.languageSettings) {
      languageSettings = pluginMessage.languageSettings;
      console.log("[get-list] Updated language settings:", languageSettings);
    }
  }
};

function updateAllUI(justSaved = false) {
  renderFileUrlBar(justSaved);
  renderProjectChipGroup();
  initChipGroupDrag();
  renderCardList(getFilteredData(), editingIndex);
  updateExportBtnAndDupWarning(mergeIdenticalEntries(currentData));
}

window.onload = () => {
  renderFileUrlBar();
  renderProjectChipGroup();
  initChipGroupDrag();
  renderCardList([], null);
  parent.postMessage({ pluginMessage: { type: 'get-lokalise-list' } }, '*');
  parent.postMessage({ pluginMessage: { type: 'get-projects' } }, '*');
  parent.postMessage({ pluginMessage: { type: 'get-language-settings' } }, '*');
};
